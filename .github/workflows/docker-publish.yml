# Build and push probenet Docker images to ghcr.io
name: docker-publish

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [trainer, rollout]
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.target }}
            type=ref,event=tag,suffix=-${{ matrix.target }}
            type=sha,prefix=${{ matrix.target }}-,format=short

      - name: Free up disk space
        run: |
          docker system prune -af --volumes 2>/dev/null || true
          docker buildx prune -af 2>/dev/null || true
          rm -rf /home/runner/.cache/uv /home/runner/.cache/pip 2>/dev/null || true
          df -h / /mnt /home 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use versioned scope to avoid stale cache from previous iterations
          cache-from: type=gha,scope=v2-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=v2-${{ matrix.target }}
