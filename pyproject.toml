[project]
name = "probenet"
version = "0.1.0"
description = "Vision-informed interactive perception for physics-aware manipulation"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vision", "src/probe", "src/graph", "src/policy", "src/utils"]
